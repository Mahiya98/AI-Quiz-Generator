<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Wizard ✨</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-blobs">
    <span class="blob b1"></span>
    <span class="blob b2"></span>
    <span class="blob b3"></span>
  </div>

  <!-- ============ PAGE 1: USER INFO ============ -->
  <section id="page-user" class="page active">
    <div class="card">
      <h1 class="title">Quiz Wizard</h1>
      <p class="subtitle">Enter your details to begin ✨</p>

      <label for="userName" class="label">Your Name</label>
      <input type="text" id="userName" placeholder="e.g. John Doe" />

      <label for="userId" class="label">Your ID</label>
      <input type="text" id="userId" placeholder="e.g. EMP-1024" />

      <button id="startBtn" class="btn primary">Start Quiz</button>
      <p class="hint">🔒 Your details are only used to record your result.</p>

      <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <p>Loading questions... ✨</p>
      </div>
    </div>
  </section>

  <!-- ============ PAGE 2: QUIZ ============ -->
  <section id="page-quiz" class="page">
    <div class="card quiz-card">
      <div class="quiz-top">
        <span id="qProgress" class="progress">Question 1/10</span>
        <span id="timer" class="timer">01:00</span>
      </div>
      <hr/>
      <h2 id="quizHeader" class="quiz-header">Quiz</h2>

      <div class="question-box">
        <p id="questionText" class="question-text">Question goes here?</p>
        <div id="options" class="options"></div>
      </div>

      <button id="nextBtn" class="btn primary">Next Question</button>
    </div>
  </section>

  <!-- ============ PAGE 3: RESULTS ============ -->
  <section id="page-result" class="page">
    <div class="card">
      <h1 class="title">Quiz Results</h1>
      <p id="userInfoLine" class="subtitle"></p>
      <div class="score-circle">
        <span id="scoreText">0/10</span>
      </div>
      <p id="scoreMsg" class="score-msg"></p>

      <button id="downloadBtn" class="btn primary">⬇️ Download Results Sheet</button>
      <button id="tryAgainBtn" class="btn secondary">Try Again</button>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
